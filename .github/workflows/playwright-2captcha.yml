name: Playwright Sepolia 2Captcha

on:
  #schedule:
  #  - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  prepare-wallets:
    runs-on: ubuntu-latest
    outputs:
      addresses: ${{ steps.wallets.outputs.addresses }}
    steps:
      - name: Define wallet addresses
        id: wallets
        run: |
          ADDRESSES='[
            "0x2D905ed3a4B659869583FEFe4473566aF31B2D8c",
            "0x90Ce606090cfEAD56fc6263F13c350c808A91903"
          ]'
          echo "addresses=$(echo "$ADDRESSES" | tr -d '\n ')" >> "$GITHUB_OUTPUT"

  test-2captcha:
    needs: prepare-wallets
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        walletAddress: ${{ fromJson(needs.prepare-wallets.outputs.addresses) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright 2Captcha tests
        env:
          WALLET_ADDRESS: ${{ matrix.walletAddress }}
          TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
        run: npx playwright test tests/sepolia-2captcha.spec.ts
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: playwright-report-2captcha-${{ matrix.walletAddress }}
          path: playwright-report/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: test-results-2captcha-${{ matrix.walletAddress }}
          path: test-results/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: screenshots-2captcha-${{ matrix.walletAddress }}
          path: |
            test-results/**/*.png
            playwright-report/**/*.png
          if-no-files-found: ignore
          retention-days: 30
