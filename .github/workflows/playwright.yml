name: Playwright Tests
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  prepare-wallets:
    runs-on: ubuntu-latest
    outputs:
      addresses: ${{ steps.wallets.outputs.addresses }}
    steps:
    - name: Define wallet addresses
      id: wallets
      run: |
        ADDRESSES='[
          "0x441181EffFeB27FD4001B79E1b3D9cbFB2c9A5b2",
          "0xE96a8207f1d6352fceADFB8Fc2ef364d7922C002",
        ]'
        echo "addresses=$(echo "$ADDRESSES" | tr -d '\n ')" >> "$GITHUB_OUTPUT"

  test:
    needs: prepare-wallets
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        walletAddress: ${{ fromJson(needs.prepare-wallets.outputs.addresses) }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      env:
        WALLET_ADDRESS: ${{ matrix.walletAddress }}
        SBR_CDP: ${{ secrets.SBR_CDP }}
      run: npx playwright test tests/sepolia.spec.ts
    - uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: playwright-report-${{ matrix.walletAddress }}
        path: playwright-report/
        retention-days: 30
    - uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: test-results-${{ matrix.walletAddress }}
        path: test-results/
        retention-days: 30
    - uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: screenshots-${{ matrix.walletAddress }}
        path: |
          test-results/**/*.png
          playwright-report/**/*.png
        if-no-files-found: ignore
        retention-days: 30
